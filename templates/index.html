<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>picam-test-1</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #080a0c;
      --surface: #101317;
      --border: #252b31;
      --text: #f2f4f5;
      --muted: #929ba4;
      --accent: #51d88a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-content {
      width: min(calc(100% - 2rem), 1200px);
      min-height: 3.5rem;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 650;
    }

    .status-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .status-list strong {
      margin-left: 0.25rem;
      color: var(--accent);
      font-weight: 600;
    }

    main {
      width: min(calc(100% - 2rem), 1200px);
      margin: 0 auto;
      padding: 1.5rem 0 2rem;
    }

    .preview-label {
      margin: 0 0 0.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .preview {
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    .preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    form {
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }

    button {
      min-width: 9rem;
      padding: 0.75rem 1.25rem;
      border: 0;
      border-radius: 0.375rem;
      background: var(--accent);
      color: #06110b;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:focus-visible {
      outline: 3px solid var(--text);
      outline-offset: 3px;
    }

    @media (max-width: 600px) {
      .header-content {
        width: min(calc(100% - 1rem), 1200px);
        min-height: auto;
        padding: 0.75rem 0;
        align-items: flex-start;
        flex-direction: column;
        gap: 0.5rem;
      }

      main {
        width: min(calc(100% - 1rem), 1200px);
        padding-top: 1rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>picam-test-1</h1>
      <div class="status-list" aria-label="System status">
        <span>Camera <strong>{{ status.camera }}</strong></span>
        <span>Storage <strong>{{ status.storage }}</strong></span>
      </div>
    </div>
  </header>

  <main>
    <p class="preview-label">Live focus preview</p>
    <div class="preview">
      <img src="{{ url_for('stream') }}" alt="Live camera preview">
    </div>

    <form method="post" action="{{ url_for('capture') }}">
      <button type="submit">Capture</button>
    </form>
  </main>
</body>
</html>
