<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>picam-test-1</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #080a0c;
      --surface: #101317;
      --border: #252b31;
      --text: #f2f4f5;
      --muted: #929ba4;
      --accent: #51d88a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-content {
      width: min(calc(100% - 2rem), 1200px);
      min-height: 3.5rem;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 650;
    }

    .status-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .status-list strong {
      margin-left: 0.25rem;
      color: var(--accent);
      font-weight: 600;
    }

    main {
      width: min(calc(100% - 2rem), 1200px);
      margin: 0 auto;
      padding: 1.5rem 0 2rem;
    }

    .preview-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .preview-label,
    .preview-state {
      margin: 0;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .preview-label {
      color: var(--muted);
    }

    .preview-state {
      color: var(--accent);
    }

    .preview-state[data-state="paused"] {
      color: var(--muted);
    }

    .preview {
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    .preview:fullscreen {
      width: 100vw;
      max-width: none;
      height: 100vh;
      aspect-ratio: auto;
      border: 0;
    }

    .preview img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .preview-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    button {
      padding: 0.625rem 0.875rem;
      border-radius: 0.375rem;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    .control-button {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    button:focus-visible {
      outline: 3px solid var(--text);
      outline-offset: 3px;
    }

    .capture-form {
      display: flex;
      justify-content: center;
      margin-top: 1rem;
    }

    .capture-button {
      min-width: 9rem;
      padding: 0.75rem 1.25rem;
      border: 0;
      background: var(--accent);
      color: #06110b;
    }

    @media (max-width: 600px) {
      .header-content {
        width: min(calc(100% - 1rem), 1200px);
        min-height: auto;
        padding: 0.75rem 0;
        align-items: flex-start;
        flex-direction: column;
        gap: 0.5rem;
      }

      main {
        width: min(calc(100% - 1rem), 1200px);
        padding-top: 1rem;
      }

      .preview-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .control-button,
      .capture-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>picam-test-1</h1>
      <div class="status-list" aria-label="System status">
        <span>Camera <strong>{{ status.camera }}</strong></span>
        <span>Storage <strong>{{ status.storage }}</strong></span>
      </div>
    </div>
  </header>

  <main>
    <div class="preview-heading">
      <p class="preview-label">Live focus preview</p>
      <p
        id="preview-state"
        class="preview-state"
        data-state="live"
        aria-live="polite"
      >Live</p>
    </div>

    <div id="preview" class="preview">
      <img
        id="preview-image"
        src="{{ url_for('stream') }}"
        data-stream-url="{{ url_for('stream') }}"
        alt="Live camera preview"
      >
    </div>

    <div class="preview-controls" aria-label="Preview controls">
      <button id="pause-preview" class="control-button" type="button">Pause</button>
      <button id="resume-preview" class="control-button" type="button">Resume</button>
      <button id="reload-preview" class="control-button" type="button">Reload</button>
      <button id="fullscreen-preview" class="control-button" type="button">Fullscreen</button>
    </div>

    <form class="capture-form" method="post" action="{{ url_for('capture') }}">
      <button class="capture-button" type="submit">Capture</button>
    </form>
  </main>

  <script>
    const preview = document.querySelector("#preview");
    const previewImage = document.querySelector("#preview-image");
    const previewState = document.querySelector("#preview-state");
    const streamUrl = previewImage.dataset.streamUrl;
    let paused = false;
    let connectionNumber = 0;
    let failedConnection = -1;

    function setPreviewState(label) {
      previewState.textContent = label;
      previewState.dataset.state = label.toLowerCase();
    }

    function reconnectPreview() {
      paused = false;
      setPreviewState("Reconnecting");
      previewImage.removeAttribute("src");

      setTimeout(() => {
        connectionNumber += 1;
        const currentConnection = connectionNumber;
        failedConnection = -1;
        previewImage.src = `${streamUrl}?connection=${connectionNumber}`;

        setTimeout(() => {
          if (
            !paused
            && currentConnection === connectionNumber
            && failedConnection !== currentConnection
            && previewImage.hasAttribute("src")
          ) {
            setPreviewState("Live");
          }
        }, 300);
      }, 0);
    }

    document.querySelector("#pause-preview").addEventListener("click", () => {
      paused = true;
      connectionNumber += 1;
      previewImage.removeAttribute("src");
      setPreviewState("Paused");
    });

    document.querySelector("#resume-preview").addEventListener("click", reconnectPreview);
    document.querySelector("#reload-preview").addEventListener("click", reconnectPreview);

    previewImage.addEventListener("load", () => {
      if (!paused) {
        setPreviewState("Live");
      }
    });

    previewImage.addEventListener("error", () => {
      if (!paused) {
        failedConnection = connectionNumber;
        setPreviewState("Reconnecting");
      }
    });

    const fullscreenButton = document.querySelector("#fullscreen-preview");

    fullscreenButton.addEventListener("click", async () => {
      if (document.fullscreenElement === preview) {
        await document.exitFullscreen();
      } else {
        await preview.requestFullscreen();
      }
    });

    document.addEventListener("fullscreenchange", () => {
      fullscreenButton.textContent =
        document.fullscreenElement === preview ? "Exit fullscreen" : "Fullscreen";
    });
  </script>
</body>
</html>
